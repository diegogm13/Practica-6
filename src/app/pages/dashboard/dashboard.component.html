<div class="home-container">

    <!-- Welcome banner -->
    @if (isLoggedIn) {
    <div class="welcome-banner">
        <div class="welcome-text">
            <h2>¡Bienvenido de nuevo!</h2>
            <p>Conectado como <strong class="user-email">{{ currentUser }}</strong></p>
        </div>
        <p-avatar icon="pi pi-user" size="xlarge" shape="circle" class="welcome-avatar"></p-avatar>
    </div>
    } @else {
    <div class="welcome-banner guest">
        <div class="welcome-text">
            <h2>Panel de Inicio</h2>
            <p>Inicia sesión para acceder a todas las funciones del sistema.</p>
        </div>
        <p-avatar icon="pi pi-lock" size="xlarge" shape="circle" class="welcome-avatar-guest"></p-avatar>
    </div>
    }

    <!-- Quick access cards -->
    <div class="quick-access-grid">

        <p-card class="quick-card" [routerLink]="['/dashboard/grupos']">
            <div class="quick-card-content">
                <p-avatar icon="pi pi-users" shape="square" class="quick-avatar blue-avatar"></p-avatar>
                <div class="quick-info">
                    <span class="quick-title">Grupos</span>
                    <span class="quick-desc">Ver estadísticas y avance</span>
                </div>
                <p-avatar icon="pi pi-chevron-right" class="arrow-avatar"></p-avatar>
            </div>
        </p-card>

        <p-card class="quick-card" [routerLink]="['/dashboard/perfil']">
            <div class="quick-card-content">
                <p-avatar icon="pi pi-user" shape="square" class="quick-avatar green-avatar"></p-avatar>
                <div class="quick-info">
                    <span class="quick-title">Mi Perfil</span>
                    <span class="quick-desc">Información de tu cuenta</span>
                </div>
                <p-avatar icon="pi pi-chevron-right" class="arrow-avatar"></p-avatar>
            </div>
        </p-card>

        <p-card class="quick-card">
            <div class="quick-card-content">
                <p-avatar icon="pi pi-chart-bar" shape="square" class="quick-avatar orange-avatar"></p-avatar>
                <div class="quick-info">
                    <span class="quick-title">Reportes</span>
                    <span class="quick-desc">Análisis y métricas</span>
                </div>
                <p-avatar icon="pi pi-chevron-right" class="arrow-avatar"></p-avatar>
            </div>
        </p-card>

    </div>

</div>
